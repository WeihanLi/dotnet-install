name: Release Artifacts

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        type: string
        default: ''
        description: "version to use for the artifact"
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-latest
            rid: osx-arm64
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      DOTNET_MULTILEVEL_LOOKUP: '0'
      VERSION: ${{ github.event.inputs.version || github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test

      - name: Publish
        run: >-
          dotnet publish src/DotNetInstallManager/DotNetInstallManager.csproj
          --runtime ${{ matrix.rid }}
          --self-contained true
          -o "${{ github.workspace }}/artifacts/${{ matrix.rid }}/publish/"

      - name: Stage artifact
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $version = '${{ env.VERSION }}'
          $publishDir = Join-Path $Env:GITHUB_WORKSPACE "artifacts/$rid/publish"
          if (-not (Test-Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }
          $binaryName = if ($rid.StartsWith('win-')) { 'dotnet-install.exe' } else { 'dotnet-install' }
          $binaryPath = Join-Path $publishDir $binaryName
          if (-not (Test-Path $binaryPath)) {
            throw "Published binary not found: $binaryPath"
          }
          $artifactDir = Join-Path $Env:GITHUB_WORKSPACE "artifacts/$rid"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $artifactName = if ($rid.StartsWith('win-')) {
            "dotnet-install-$version-$rid.exe"
          } else {
            "dotnet-install-$version-$rid"
          }
          $artifactPath = Join-Path $artifactDir $artifactName
          Copy-Item -LiteralPath $binaryPath -Destination $artifactPath -Force
          Write-Host "Staged $artifactPath"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-install-${{ env.VERSION }}-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}/dotnet-install-${{ env.VERSION }}-${{ matrix.rid }}*
          if-no-files-found: error

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ matrix.rid }}/dotnet-install-${{ env.VERSION }}-${{ matrix.rid }}*
