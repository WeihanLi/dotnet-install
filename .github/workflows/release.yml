name: Release Artifacts

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        type: string
        default: ''
        description: "version to use for the artifact"
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: ubuntu-latest
            rid: linux-musl-x64
          - os: ubuntu-24.04-arm
            rid: linux-musl-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      DOTNET_MULTILEVEL_LOOKUP: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: install-dotnet
        uses: ./
        with:
          version: 10.0.x

      - name: Resolve release version
        shell: pwsh
        run: |
          $rawVersion = '${{ github.event.inputs.version || github.event.release.tag_name || github.ref_name }}'.Trim()
          if ([string]::IsNullOrWhiteSpace($rawVersion)) {
            throw "A release version is required."
          }

          if ($rawVersion.StartsWith('refs/tags/')) {
            $rawVersion = $rawVersion.Substring('refs/tags/'.Length)
          }

          $normalizedVersion = $rawVersion.StartsWith('v') ? $rawVersion.Substring(1) : $rawVersion
          if ([string]::IsNullOrWhiteSpace($normalizedVersion)) {
            throw "Resolved release version is empty."
          }

          "NORMALIZED_VERSION=$normalizedVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        run: dotnet build DotNetInstall.slnx -c Release -p:Version=${{ env.NORMALIZED_VERSION }}

      - name: Test
        run: dotnet test DotNetInstall.slnx -c Release --no-build

      - name: Install native toolchain
        if: matrix.rid == 'linux-musl-x64' || matrix.rid == 'linux-musl-arm64'
        run: sudo apt-get update && sudo apt-get install -y musl-dev

      - name: Publish
        run: >-
          dotnet publish src/DotNetInstall/DotNetInstall.csproj
          -c Release
          -p:PublishAot=true
          -p:Version=${{ env.NORMALIZED_VERSION }}
          -p:StripSymbols=true
          -p:InvariantGlobalization=true
          --runtime ${{ matrix.rid }}
          -o "${{ github.workspace }}/artifacts/${{ matrix.rid }}/publish/"

      - name: Stage artifact
        shell: pwsh
        run: |
          $rid = '${{ matrix.rid }}'
          $version = '${{ env.NORMALIZED_VERSION }}'
          $publishDir = Join-Path $Env:GITHUB_WORKSPACE "artifacts/$rid/publish"
          if (-not (Test-Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }
          $binaryName = if ($rid.StartsWith('win-')) { 'dotnet-install.exe' } else { 'dotnet-install' }
          $binaryPath = Join-Path $publishDir $binaryName
          if (-not (Test-Path $binaryPath)) {
            throw "Published binary not found: $binaryPath"
          }
          $artifactDir = Join-Path $Env:GITHUB_WORKSPACE "artifacts/$rid"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $artifactName = if ($rid.StartsWith('win-')) {
            "dotnet-install-$version-$rid.exe"
          } else {
            "dotnet-install-$version-$rid"
          }
          $artifactPath = Join-Path $artifactDir $artifactName
          Copy-Item -LiteralPath $binaryPath -Destination $artifactPath -Force
          $hash = (Get-FileHash -LiteralPath $artifactPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $artifactName" | Set-Content -LiteralPath "$artifactPath.sha256" -NoNewline
          Write-Host "Staged $artifactPath"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-install-${{ env.NORMALIZED_VERSION }}-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}/dotnet-install-${{ env.NORMALIZED_VERSION }}-${{ matrix.rid }}*
          if-no-files-found: error

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/${{ matrix.rid }}/dotnet-install-${{ env.NORMALIZED_VERSION }}-${{ matrix.rid }}*
