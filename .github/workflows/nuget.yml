name: nuget-publish

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        type: string
        default: ''
        description: "version to use for the nuget package, e.g. 1.0.0 or 1.0.0-preview-3"
        required: true

jobs:
  nuget-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
      DOTNET_MULTILEVEL_LOOKUP: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: install-dotnet
        uses: WeihanLi/dotnet-install@0.1.0
        with:
          version: 10.0.x

      - name: Resolve package version
        shell: pwsh
        run: |
          $rawVersion = '${{ github.event.inputs.version || github.event.release.tag_name || github.ref_name }}'.Trim()
          if ([string]::IsNullOrWhiteSpace($rawVersion)) {
            throw "A package version is required."
          }

          if ($rawVersion.StartsWith('refs/tags/')) {
            $rawVersion = $rawVersion.Substring('refs/tags/'.Length)
          }

          $normalizedVersion = $rawVersion.StartsWith('v') ? $rawVersion.Substring(1) : $rawVersion
          if ([string]::IsNullOrWhiteSpace($normalizedVersion)) {
            throw "Resolved package version is empty."
          }

          "NORMALIZED_VERSION=$normalizedVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # Build your nuget package here
      - name: Build NuGet package
        run: dotnet pack ./src/DotNetInstall/DotNetInstall.csproj -c Release -p:Version=${{ env.NORMALIZED_VERSION }} -o ./artifacts/out/

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: 'weihanli'

      # Push the package
      - name: NuGet push
        run: dotnet nuget push ./artifacts/out/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source nuget --skip-duplicate
